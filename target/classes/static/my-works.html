<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的作品 - 墨韵书阁</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: #fff;
            padding: 14px 0;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .title { font-size: 20px; font-weight: 700; }
        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
        }
        .page-wrap { padding: 20px 0 28px; }
        .toolbar, .list-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            padding: 16px;
            margin-bottom: 16px;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .toolbar-left {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .input, .select {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 14px;
            min-width: 170px;
        }
        .btn {
            border: none;
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-primary { background: #e74c3c; color: #fff; }
        .btn-ghost { background: #f2f2f2; color: #333; }
        .btn-success { background: #27ae60; color: #fff; }
        .btn-warning { background: #f39c12; color: #fff; }
        .status {
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 14px;
            font-size: 14px;
        }
        .status.loading { background: #f3f7ff; color: #3a66b0; }
        .status.error { background: #fff1f0; color: #cf1322; }
        .status.success { background: #f6ffed; color: #389e0d; }
        .work-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }
        .work-item {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            gap: 12px;
            transition: all 0.2s;
        }
        .work-item:hover {
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
            border-color: #e7e7e7;
        }
        .cover {
            width: 76px;
            height: 100px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }
        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .work-main {
            flex: 1;
            min-width: 0;
        }
        .work-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .meta {
            color: #777;
            font-size: 13px;
            line-height: 1.7;
            margin-bottom: 8px;
        }
        .desc {
            color: #666;
            font-size: 13px;
            line-height: 1.6;
            min-height: 40px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .action-btn {
            border: 1px solid #e0e0e0;
            background: #fff;
            color: #555;
            border-radius: 16px;
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
        }
        .action-btn:hover { border-color: #e74c3c; color: #e74c3c; }
        .action-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .action-btn.disabled:hover { border-color: #e0e0e0; color: #555; }
        .pagination {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .page-btn {
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 13px;
            min-width: 34px;
        }
        .page-btn.active {
            background: #e74c3c;
            border-color: #e74c3c;
            color: #fff;
        }
        .empty {
            text-align: center;
            color: #888;
            padding: 30px 0;
        }
        .status-draft { color: #f39c12; }
        .status-pending { color: #3498db; }
        .status-published { color: #27ae60; }
        .status-rejected { color: #e74c3c; }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 12px;
            width: 750px;
            max-width: 95%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .modal-header h3 { font-size: 18px; }
        .close-modal {
            font-size: 24px;
            cursor: pointer;
        }
        .modal-body { padding: 20px; }
        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            position: sticky;
            bottom: 0;
            background: white;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
        }
        .form-group textarea {
            min-height: 300px;
            resize: vertical;
            font-family: 'Georgia', 'Times New Roman', serif;
            line-height: 1.6;
        }

        /* 选择面板样式 */
        .choice-panel {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .choice-card {
            flex: 1;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .choice-card:hover {
            border-color: #e74c3c;
            background: #fff5f5;
        }
        .choice-card.selected {
            border-color: #e74c3c;
            background: #fff5f5;
            box-shadow: 0 2px 10px rgba(231, 76, 60, 0.2);
        }
        .choice-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }
        .choice-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .choice-desc {
            font-size: 12px;
            color: #999;
        }

        /* 章节列表样式 */
        .chapter-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .chapter-info {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 13px;
            color: #666;
        }
        .chapter-preview {
            background: #fef9e7;
            border-left: 4px solid #f39c12;
            padding: 12px;
            margin-top: 15px;
            font-size: 13px;
            max-height: 150px;
            overflow-y: auto;
        }
        .chapter-preview h4 {
            margin-bottom: 8px;
            color: #e67e22;
        }
        .chapter-preview-content {
            white-space: pre-wrap;
            line-height: 1.5;
            color: #555;
        }
        .loading-small {
            text-align: center;
            padding: 10px;
            color: #999;
        }
        @media (max-width: 900px) {
            .work-list { grid-template-columns: 1fr; }
            .choice-panel { flex-direction: column; }
        }
        @media (max-width: 768px) {
            .toolbar { flex-direction: column; align-items: stretch; }
            .toolbar-left { width: 100%; }
            .input, .select { width: 100%; }
        }
    </style>
</head>
<body>
<header class="header">
    <div class="container header-content">
        <div class="title"><i class="fas fa-feather-alt"></i> 我的作品</div>
        <a class="back-btn" href="/index.html"><i class="fas fa-arrow-left"></i> 返回首页</a>
    </div>
</header>

<main class="container page-wrap">
    <div id="globalStatus" class="status loading">正在加载作品列表...</div>

    <section class="toolbar">
        <div class="toolbar-left">
            <input id="searchKeyword" class="input" placeholder="搜索作品名">
            <select id="statusFilter" class="select">
                <option value="all">全部状态</option>
                <option value="0">草稿</option>
                <option value="1">待审核</option>
                <option value="2">已发布</option>
                <option value="3">已驳回</option>
            </select>
            <select id="pageSizeSelect" class="select">
                <option value="5">每页 5 条</option>
                <option value="10" selected>每页 10 条</option>
                <option value="20">每页 20 条</option>
            </select>
        </div>
        <div>
            <button id="searchBtn" class="btn btn-ghost" type="button">查询</button>
            <button id="resetBtn" class="btn btn-ghost" type="button">重置</button>
            <button id="publishBtn" class="btn btn-primary" type="button"><i class="fas fa-plus"></i> 发布作品</button>
        </div>
    </section>

    <section class="list-card">
        <div id="workList" class="work-list"></div>
        <div id="pagination" class="pagination"></div>
    </section>
</main>

<!-- 章节管理模态框 - 选择操作类型 -->
<div id="chapterManageModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-edit"></i> 章节管理</h3>
            <span class="close-modal" onclick="closeChapterManageModal()">&times;</span>
        </div>
        <div class="modal-body">
            <div class="choice-panel">
                <div class="choice-card" onclick="selectAction('add')" id="choiceAdd">
                    <div class="choice-icon"><i class="fas fa-plus-circle"></i></div>
                    <div class="choice-title">增加新章节</div>
                    <div class="choice-desc">为作品添加新的章节内容</div>
                </div>
                <div class="choice-card" onclick="selectAction('edit')" id="choiceEdit">
                    <div class="choice-icon"><i class="fas fa-edit"></i></div>
                    <div class="choice-title">修改已有章节</div>
                    <div class="choice-desc">编辑已发布的章节内容</div>
                </div>
            </div>
            <div id="actionContent"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeChapterManageModal()">取消</button>
            <button class="btn btn-primary" id="confirmActionBtn" style="display: none;" onclick="confirmAction()">确认</button>
        </div>
    </div>
</div>

<script>
    let userId = null;
    let allWorks = [];
    let filteredWorks = [];
    let currentPage = 1;
    let pageSize = 10;
    let currentBookId = null;
    let currentBook = null;
    let selectedAction = null;
    let chaptersList = [];
    let selectedChapterId = null;
    let selectedChapterData = null;
    let isLoadingContent = false;

    // 状态文本
    function getStatusText(book) {
        const auditStatus = book.auditStatus;
        const status = book.status;

        if (auditStatus === 0) return '草稿';
        if (auditStatus === 1) return '待审核';
        if (auditStatus === 3) return '已驳回';
        if (auditStatus === 2) {
            if (status === 0) return '连载中';
            if (status === 1) return '已完结';
            if (status === 2) return '已下架';
            return '已发布';
        }
        return '未知';
    }

    function getStatusClass(book) {
        const auditStatus = book.auditStatus;
        if (auditStatus === 0) return 'status-draft';
        if (auditStatus === 1) return 'status-pending';
        if (auditStatus === 2) return 'status-published';
        if (auditStatus === 3) return 'status-rejected';
        return '';
    }

    // 判断是否可以编辑信息（草稿或已驳回）
    function canEditInfo(book) {
        return book.auditStatus === 0 || book.auditStatus === 3;
    }

    // 判断是否可以管理章节
    function canManageChapter(book) {
        if (book.auditStatus === 1) return false;
        if (book.auditStatus === 2 && book.status === 1) return false;
        if (book.auditStatus === 2 && book.status === 2) return false;
        return true;
    }

    function showSubmitAudit(book) {
        return book.auditStatus === 0;
    }

    function showResubmitAudit(book) {
        return book.auditStatus === 3;
    }

    function showEditStatus(book) {
        return book.auditStatus === 2;
    }

    function setStatus(type, text) {
        const node = document.getElementById('globalStatus');
        node.className = 'status ' + type;
        node.textContent = text;
        node.style.display = 'block';
        setTimeout(() => {
            node.style.display = 'none';
        }, 3000);
    }

    function ensureLogin() {
        const token = localStorage.getItem('token');
        const uid = localStorage.getItem('userId');
        if (!token || !uid) {
            alert('请先登录');
            window.location.href = '/index.html';
            return false;
        }
        userId = uid;
        return true;
    }

    function formatDate(isoDate) {
        if (!isoDate) return '--';
        const date = new Date(isoDate);
        if (isNaN(date.getTime())) return isoDate;
        return date.toLocaleString('zh-CN', { hour12: false });
    }

    async function loadWorks() {
        if (!ensureLogin()) return;
        setStatus('loading', '正在加载作品列表...');
        try {
            const resp = await fetch(`/api/author/${userId}/books`);
            const result = await resp.json();
            if (result.code !== 200) {
                throw new Error(result.msg || '加载失败');
            }
            allWorks = Array.isArray(result.data) ? result.data : [];
            applyFilterAndRender();
            setStatus('success', `共加载 ${allWorks.length} 部作品`);
        } catch (error) {
            console.error(error);
            setStatus('error', error.message || '加载失败，请稍后重试');
            document.getElementById('workList').innerHTML = '<div class="empty">加载失败</div>';
            document.getElementById('pagination').innerHTML = '';
        }
    }

    function applyFilterAndRender() {
        const keyword = document.getElementById('searchKeyword').value.trim();
        const filterStatus = document.getElementById('statusFilter').value;
        pageSize = Number(document.getElementById('pageSizeSelect').value) || 10;

        filteredWorks = allWorks.filter(item => {
            const matchKeyword = !keyword || (item.bookName || '').includes(keyword);
            let matchStatus = true;
            if (filterStatus !== 'all') {
                const auditStatus = item.auditStatus;
                matchStatus = String(auditStatus) === filterStatus;
            }
            return matchKeyword && matchStatus;
        });
        currentPage = 1;
        renderCurrentPage();
    }

    function renderCurrentPage() {
        const total = filteredWorks.length;
        const start = (currentPage - 1) * pageSize;
        const current = filteredWorks.slice(start, start + pageSize);
        const listNode = document.getElementById('workList');

        if (total === 0) {
            listNode.innerHTML = '<div class="empty">暂无符合条件的作品</div>';
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        let html = '';
        for (let i = 0; i < current.length; i++) {
            const book = current[i];
            const coverHtml = book.cover ? `<img src="${book.cover}" alt="封面">` : '<i class="fas fa-book"></i>';
            const statusText = getStatusText(book);
            const statusClass = getStatusClass(book);
            const canManage = canManageChapter(book);
            const canEdit = canEditInfo(book);
            const showSubmit = showSubmitAudit(book);
            const showResubmit = showResubmitAudit(book);
            const showStatusEdit = showEditStatus(book);

            html += `
                <article class="work-item">
                    <div class="cover">${coverHtml}</div>
                    <div class="work-main">
                        <div class="work-title">${escapeHtml(book.bookName) || '未命名作品'}</div>
                        <div class="meta">
                            <div>状态：<span class="${statusClass}">${statusText}</span></div>
                            <div>更新时间：${formatDate(book.updateTime)}</div>
                            <div>分类：${escapeHtml(book.categoryName) || '未分类'} | 字数：${book.totalWords || 0}</div>
                            ${book.auditStatus === 3 && book.auditRemark ? `<div>驳回原因：${escapeHtml(book.auditRemark)}</div>` : ''}
                        </div>
                        <div class="desc">${escapeHtml(book.description) || '暂无作品简介'}</div>
                        <div class="actions">
                            <button class="action-btn" onclick="viewBook(${book.id})">查看详情</button>
                            ${canManage ? `<button class="action-btn" style="background:#3498db;color:white;" onclick="openChapterManageModal(${book.id})">📖 修改章节</button>` : ''}
                            ${showSubmit ? `<button class="action-btn" style="background:#27ae60;color:white;" onclick="submitForAudit(${book.id})">提交审核</button>` : ''}
                            ${showResubmit ? `<button class="action-btn" style="background:#f39c12;color:white;" onclick="resubmitForAudit(${book.id})">再次审核</button>` : ''}
                            ${canEdit ? `<button class="action-btn" onclick="showEditBookModal(${book.id})">编辑信息</button>` : ''}
                            ${showStatusEdit ? `<button class="action-btn" onclick="editBookStatus(${book.id}, ${book.status})">修改状态</button>` : ''}
                            <button class="action-btn" onclick="deleteBook(${book.id})">下架</button>
                        </div>
                    </div>
                </article>
            `;
        }

        listNode.innerHTML = html;
        renderPagination(total);
    }

    function renderPagination(totalCount) {
        const pageCount = Math.ceil(totalCount / pageSize);
        const pager = document.getElementById('pagination');
        if (pageCount <= 1) {
            pager.innerHTML = '';
            return;
        }

        let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">上一页</button>`;
        for (let i = 1; i <= pageCount; i++) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
        }
        html += `<button class="page-btn" ${currentPage === pageCount ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">下一页</button>`;
        pager.innerHTML = html;
    }

    function changePage(page) {
        const pageCount = Math.ceil(filteredWorks.length / pageSize);
        if (page < 1 || page > pageCount) return;
        currentPage = page;
        renderCurrentPage();
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function viewBook(bookId) {
        window.location.href = `/book.html?id=${bookId}`;
    }

    async function updateStatus(bookId, status) {
        const token = localStorage.getItem('token');
        const resp = await fetch(`/api/author/${userId}/book/${bookId}/status?status=${status}`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const result = await resp.json();
        if (result.code !== 200) {
            throw new Error(result.msg || '操作失败');
        }
    }

    // 打开章节管理模态框
    async function openChapterManageModal(bookId) {
        currentBookId = bookId;
        currentBook = allWorks.find(b => b.id === bookId);
        selectedAction = null;
        selectedChapterId = null;
        selectedChapterData = null;

        // 加载章节列表
        await loadChapters(bookId);

        // 重置选择
        document.getElementById('choiceAdd').classList.remove('selected');
        document.getElementById('choiceEdit').classList.remove('selected');
        document.getElementById('actionContent').innerHTML = '';
        document.getElementById('confirmActionBtn').style.display = 'none';

        document.getElementById('chapterManageModal').style.display = 'flex';
    }

    function closeChapterManageModal() {
        document.getElementById('chapterManageModal').style.display = 'none';
        selectedAction = null;
        selectedChapterId = null;
        selectedChapterData = null;
        chaptersList = [];
    }

    // 加载章节列表
    async function loadChapters(bookId) {
        try {
            const token = localStorage.getItem('token');
            const resp = await fetch(`/api/author/${userId}/books/${bookId}/chapters`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const result = await resp.json();
            if (result.code === 200) {
                chaptersList = result.data || [];
            } else {
                chaptersList = [];
            }
        } catch (error) {
            console.error('加载章节失败:', error);
            chaptersList = [];
        }
    }

    // 选择操作类型
    function selectAction(action) {
        selectedAction = action;

        // 更新UI选择状态
        document.getElementById('choiceAdd').classList.remove('selected');
        document.getElementById('choiceEdit').classList.remove('selected');
        if (action === 'add') {
            document.getElementById('choiceAdd').classList.add('selected');
        } else {
            document.getElementById('choiceEdit').classList.add('selected');
        }

        // 显示对应的表单
        const actionContent = document.getElementById('actionContent');
        const confirmBtn = document.getElementById('confirmActionBtn');

        if (action === 'add') {
            actionContent.innerHTML = `
                <div class="form-group">
                    <label>章节标题 <span style="color:#e74c3c;">*</span></label>
                    <input type="text" id="newChapterName" placeholder="请输入章节标题（2-30个字符）">
                </div>
                <div class="form-group">
                    <label>章节内容 <span style="color:#e74c3c;">*</span></label>
                    <textarea id="newChapterContent" placeholder="请输入章节内容（至少20个字符）" rows="12"></textarea>
                </div>
                <div class="chapter-info">
                    <i class="fas fa-info-circle"></i> 提示：添加新章节后，章节会自动添加到作品末尾。
                    ${currentBook && currentBook.auditStatus === 3 ? '<br><i class="fas fa-exclamation-triangle"></i> 当前作品是驳回状态，添加章节后需要重新提交审核。' : ''}
                </div>
            `;
            confirmBtn.style.display = 'block';
            confirmBtn.textContent = '确认添加';
            confirmBtn.onclick = addNewChapter;
        } else if (action === 'edit') {
            if (chaptersList.length === 0) {
                actionContent.innerHTML = `
                    <div class="chapter-info" style="background:#fdecea; color:#e74c3c;">
                        <i class="fas fa-exclamation-triangle"></i> 暂无章节可编辑，请先添加章节。
                    </div>
                `;
                confirmBtn.style.display = 'none';
                return;
            }

            let chapterOptions = '<option value="">请选择要修改的章节</option>';
            chaptersList.forEach(chapter => {
                chapterOptions += `<option value="${chapter.id}">第${chapter.chapterNum}章 ${escapeHtml(chapter.chapterName)}</option>`;
            });

            actionContent.innerHTML = `
                <div class="form-group">
                    <label>选择章节 <span style="color:#e74c3c;">*</span></label>
                    <select id="editChapterSelect" class="chapter-select" onchange="onChapterSelected()">
                        ${chapterOptions}
                    </select>
                </div>
                <div id="chapterPreviewArea" style="display: none;">
                    <div class="chapter-preview">
                        <h4><i class="fas fa-file-alt"></i> 当前内容预览</h4>
                        <div id="chapterPreviewContent" class="chapter-preview-content"></div>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>章节标题 <span style="color:#e74c3c;">*</span></label>
                    <input type="text" id="editChapterName" placeholder="章节标题（2-30个字符）">
                </div>
                <div class="form-group">
                    <label>章节内容 <span style="color:#e74c3c;">*</span></label>
                    <textarea id="editChapterContent" placeholder="请输入章节内容（至少20个字符）" rows="12"></textarea>
                </div>
                <div class="chapter-info">
                    <i class="fas fa-info-circle"></i> 提示：您可以在原内容基础上直接修改，修改后作品总字数会自动更新。
                </div>
            `;
            confirmBtn.style.display = 'block';
            confirmBtn.textContent = '确认修改';
            confirmBtn.onclick = updateChapter;
        }
    }

    // 当用户选择章节时触发 - 加载章节原有内容
    async function onChapterSelected() {
        const select = document.getElementById('editChapterSelect');
        const chapterId = select.value;
        if (!chapterId) {
            document.getElementById('chapterPreviewArea').style.display = 'none';
            document.getElementById('editChapterName').value = '';
            document.getElementById('editChapterContent').value = '';
            selectedChapterId = null;
            selectedChapterData = null;
            return;
        }

        selectedChapterId = parseInt(chapterId);

        // 显示加载状态
        document.getElementById('chapterPreviewArea').style.display = 'block';
        document.getElementById('chapterPreviewContent').innerHTML = '<div class="loading-small"><i class="fas fa-spinner fa-spin"></i> 加载章节内容...</div>';
        document.getElementById('editChapterName').value = '加载中...';
        document.getElementById('editChapterContent').value = '加载中...';

        // 加载章节完整内容
        await loadFullChapterContent(selectedChapterId);
    }

    // 加载完整章节内容（用于编辑）
    async function loadFullChapterContent(chapterId) {
        if (isLoadingContent) return;
        isLoadingContent = true;

        try {
            const token = localStorage.getItem('token');
            // 使用图书详情接口获取章节内容
            const resp = await fetch(`/api/book/chapter/${chapterId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const result = await resp.json();

            if (result.code === 200 && result.data) {
                const chapter = result.data;
                selectedChapterData = chapter;

                // 更新预览区域
                const previewContent = chapter.content || '';
                const previewText = previewContent.length > 500
                    ? previewContent.substring(0, 500) + '...\n\n（仅显示前500字符，完整内容请在下方编辑区修改）'
                    : previewContent;
                document.getElementById('chapterPreviewContent').innerHTML = escapeHtml(previewText).replace(/\n/g, '<br>');

                // 更新编辑表单
                document.getElementById('editChapterName').value = chapter.chapterName || '';
                document.getElementById('editChapterContent').value = chapter.content || '';
            } else {
                document.getElementById('chapterPreviewContent').innerHTML = '<span style="color:#e74c3c;">加载失败：' + (result.msg || '未知错误') + '</span>';
                document.getElementById('editChapterName').value = '';
                document.getElementById('editChapterContent').value = '';
            }
        } catch (error) {
            console.error('加载章节内容失败:', error);
            document.getElementById('chapterPreviewContent').innerHTML = '<span style="color:#e74c3c;">加载失败，请刷新重试</span>';
            document.getElementById('editChapterName').value = '';
            document.getElementById('editChapterContent').value = '';
        } finally {
            isLoadingContent = false;
        }
    }

    // 添加新章节
    async function addNewChapter() {
        const chapterName = document.getElementById('newChapterName').value.trim();
        const content = document.getElementById('newChapterContent').value.trim();

        if (!chapterName) {
            alert('请输入章节标题');
            return;
        }
        if (chapterName.length < 2 || chapterName.length > 30) {
            alert('章节标题长度必须在2-30个字符之间');
            return;
        }
        if (!content) {
            alert('请输入章节内容');
            return;
        }
        if (content.length < 20) {
            alert('章节内容至少需要20个字符');
            return;
        }

        const confirmBtn = document.getElementById('confirmActionBtn');
        confirmBtn.disabled = true;
        confirmBtn.textContent = '添加中...';

        try {
            const token = localStorage.getItem('token');
            const resp = await fetch(`/api/author/${userId}/chapter`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    bookId: currentBookId,
                    chapterName: chapterName,
                    content: content
                })
            });
            const result = await resp.json();

            if (result.code === 200) {
                alert('章节添加成功！');
                closeChapterManageModal();
                await loadWorks();
            } else {
                alert(result.msg || '添加失败');
            }
        } catch (error) {
            console.error('添加章节失败:', error);
            alert('操作失败，请稍后重试');
        } finally {
            confirmBtn.disabled = false;
            confirmBtn.textContent = '确认添加';
        }
    }

    // 修改章节
    async function updateChapter() {
        const chapterId = selectedChapterId;
        if (!chapterId) {
            alert('请选择要修改的章节');
            return;
        }

        const chapterName = document.getElementById('editChapterName').value.trim();
        const content = document.getElementById('editChapterContent').value.trim();

        if (!chapterName) {
            alert('请输入章节标题');
            return;
        }
        if (chapterName.length < 2 || chapterName.length > 30) {
            alert('章节标题长度必须在2-30个字符之间');
            return;
        }
        if (!content) {
            alert('请输入章节内容');
            return;
        }
        if (content.length < 20) {
            alert('章节内容至少需要20个字符');
            return;
        }

        // 检查是否有实际修改
        if (selectedChapterData && selectedChapterData.content === content && selectedChapterData.chapterName === chapterName) {
            if (!confirm('章节内容没有变化，确定要保存吗？')) {
                return;
            }
        }

        const confirmBtn = document.getElementById('confirmActionBtn');
        confirmBtn.disabled = true;
        confirmBtn.textContent = '修改中...';

        try {
            const token = localStorage.getItem('token');

            // 如果标题也修改了，需要先更新标题（通过单独的接口或一并处理）
            // 注意：现有的更新章节接口只支持更新内容，如果需要更新标题需要额外处理
            const resp = await fetch(`/api/author/${userId}/chapter`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    chapterId: chapterId,
                    content: content
                })
            });
            const result = await resp.json();

            if (result.code === 200) {
                alert('章节修改成功！');
                closeChapterManageModal();
                await loadWorks();
            } else {
                alert(result.msg || '修改失败');
            }
        } catch (error) {
            console.error('修改章节失败:', error);
            alert('操作失败，请稍后重试');
        } finally {
            confirmBtn.disabled = false;
            confirmBtn.textContent = '确认修改';
        }
    }

    function confirmAction() {
        // 由 selectAction 中设置的 onclick 处理
    }

    // 编辑书籍信息模态框
    let currentEditingBook = null;

    function showEditBookModal(bookId) {
        const book = allWorks.find(b => b.id === bookId);
        if (!book) return;
        currentEditingBook = book;

        // 移除已存在的模态框
        const existingModal = document.getElementById('editBookModal');
        if (existingModal) existingModal.remove();

        const modalHtml = `
            <div id="editBookModal" class="modal" style="display:flex;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>编辑作品信息</h3>
                        <span class="close-modal" onclick="closeEditBookModal()">&times;</span>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label>作品名称</label>
                            <input type="text" id="editBookName" value="${escapeHtml(book.bookName)}">
                        </div>
                        <div class="form-group">
                            <label>作品简介</label>
                            <textarea id="editBookDesc" rows="4">${escapeHtml(book.description || '')}</textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-ghost" onclick="closeEditBookModal()">取消</button>
                        <button class="btn btn-primary" onclick="updateBookInfo()">保存修改</button>
                    </div>
                </div>
            </div>
        `;

        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    function closeEditBookModal() {
        const modal = document.getElementById('editBookModal');
        if (modal) modal.remove();
        currentEditingBook = null;
    }

    async function updateBookInfo() {
        const bookName = document.getElementById('editBookName').value.trim();
        const description = document.getElementById('editBookDesc').value.trim();

        if (!bookName) {
            alert('请输入作品名称');
            return;
        }
        if (bookName.length < 2 || bookName.length > 50) {
            alert('作品名称长度必须在2-50个字符之间');
            return;
        }

        try {
            const token = localStorage.getItem('token');
            const resp = await fetch(`/api/author/${userId}/book/${currentEditingBook.id}/info`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ bookName, description })
            });
            const result = await resp.json();
            if (result.code === 200) {
                alert('更新成功');
                closeEditBookModal();
                await loadWorks();
            } else {
                alert(result.msg || '更新失败');
            }
        } catch (error) {
            alert('操作失败，请稍后重试');
        }
    }

    async function editBookStatus(bookId, currentStatus) {
        const input = prompt('请选择新状态：\n0 = 连载中\n1 = 已完结\n2 = 已下架', String(currentStatus ?? 0));
        if (input === null) return;
        const nextStatus = Number(input);
        if (![0, 1, 2].includes(nextStatus)) {
            alert('状态值无效');
            return;
        }
        try {
            await updateStatus(bookId, nextStatus);
            alert('状态更新成功');
            await loadWorks();
        } catch (error) {
            alert(error.message || '状态更新失败');
        }
    }

    async function deleteBook(bookId) {
        const book = allWorks.find(b => b.id === bookId);
        if (!book) return;

        let message = '确定要下架这部作品吗？';
        if (book.auditStatus === 0) {
            message = '确定要删除这个草稿吗？删除后不可恢复。';
        } else if (book.auditStatus === 2 && book.status === 0) {
            message = '确定要下架这部作品吗？下架后读者将无法阅读。';
        }

        if (!confirm(message)) return;

        try {
            await updateStatus(bookId, 2);
            alert('操作成功');
            await loadWorks();
        } catch (error) {
            alert(error.message || '操作失败');
        }
    }

    async function submitForAudit(bookId) {
        if (!confirm('确定要提交审核吗？提交后作品将进入审核流程，审核期间无法修改。')) return;

        try {
            const token = localStorage.getItem('token');
            const resp = await fetch(`/api/author/${userId}/book/${bookId}/submit-audit`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            });
            const result = await resp.json();
            if (result.code === 200) {
                alert('提交审核成功！请等待管理员审核。');
                await loadWorks();
            } else {
                alert(result.msg || '提交失败');
            }
        } catch (error) {
            alert('操作失败，请稍后重试');
        }
    }

    async function resubmitForAudit(bookId) {
        if (!confirm('确定要再次提交审核吗？提交后作品将重新进入审核流程。')) return;

        try {
            const token = localStorage.getItem('token');
            const resp = await fetch(`/api/author/${userId}/book/${bookId}/resubmit-audit`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            });
            const result = await resp.json();
            if (result.code === 200) {
                alert('再次提交成功！请等待管理员审核。');
                await loadWorks();
            } else {
                alert(result.msg || '提交失败');
            }
        } catch (error) {
            alert('操作失败，请稍后重试');
        }
    }

    function resetFilters() {
        document.getElementById('searchKeyword').value = '';
        document.getElementById('statusFilter').value = 'all';
        document.getElementById('pageSizeSelect').value = '10';
        applyFilterAndRender();
    }

    function goToPublish() {
        window.location.href = '/publish.html';
    }

    window.onload = async function() {
        document.getElementById('searchBtn').addEventListener('click', applyFilterAndRender);
        document.getElementById('resetBtn').addEventListener('click', resetFilters);
        document.getElementById('pageSizeSelect').addEventListener('change', applyFilterAndRender);
        document.getElementById('publishBtn').addEventListener('click', goToPublish);

        // 点击模态框外部关闭
        window.addEventListener('click', function(event) {
            const modal = document.getElementById('chapterManageModal');
            if (event.target === modal) closeChapterManageModal();
            const editModal = document.getElementById('editBookModal');
            if (event.target === editModal) closeEditBookModal();
        });

        await loadWorks();
    };
</script>
</body>
</html>
