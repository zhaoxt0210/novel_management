spring:
  application:
    name: novel-management-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://82.156.240.2:3306/novel_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: novel_root
    password: novel_123456
    hikari:
      # 连接超时时间（毫秒）
      connection-timeout: 30000
      # 等待连接池返回连接的超时时间
      validation-timeout: 5000
      # 连接最大存活时间（防止长时间不用的连接被数据库踢掉）
      max-lifetime: 1800000     # 30分钟
      # 空闲连接存活时间
      idle-timeout: 600000      # 10分钟
      # 核心参数调整
      minimum-idle: 3           # 推荐改成 2~5
      maximum-pool-size: 20     # 推荐改成 15~30（视并发量）
      leak-detection-threshold: 60000   # 检测连接泄漏
      initialization-fail-timeout: -1   # 启动时数据库不可用也不直接失败

server:
  port: 8080

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.novel.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: novelSecretKey12345678901234567890123456789012
  expiration: 86400000

logging:
  level:
    com.novel: debug