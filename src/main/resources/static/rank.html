<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排行榜 - 墨韵书阁</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo a {
            color: white;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 25px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .page-content {
            padding: 40px 0;
        }

        .page-title {
            text-align: center;
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .page-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-bottom: 40px;
        }

        .rank-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .rank-tab {
            padding: 12px 30px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
            color: rgba(255,255,255,0.8);
        }

        .rank-tab:hover,
        .rank-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .rank-list-container {
            display: none;
        }

        .rank-list-container.active {
            display: block;
        }

        .rank-item {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .rank-item:hover {
            background: rgba(255,255,255,0.12);
            transform: translateX(10px);
            box-shadow: 0 5px 25px rgba(0,0,0,0.2);
        }

        .rank-number {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            border-radius: 50%;
            margin-right: 20px;
            flex-shrink: 0;
        }

        .rank-item:nth-child(1) .rank-number {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #8B4513;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .rank-item:nth-child(2) .rank-number {
            background: linear-gradient(135deg, #c0c0c0, #e8e8e8);
            color: #4a4a4a;
            box-shadow: 0 4px 15px rgba(192, 192, 192, 0.4);
        }

        .rank-item:nth-child(3) .rank-number {
            background: linear-gradient(135deg, #cd7f32, #e8a758);
            color: #5a3a1a;
            box-shadow: 0 4px 15px rgba(205, 127, 50, 0.4);
        }

        .rank-number:not(:nth-child(-n+3)) {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
        }

        .book-cover {
            width: 80px;
            height: 110px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-right: 20px;
            flex-shrink: 0;
        }

        .book-info {
            flex: 1;
            min-width: 0;
        }

        .book-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .book-author {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .book-stats {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        .book-stats span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .book-desc {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin-top: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.6);
            font-size: 18px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-icon {
            font-size: 80px;
            color: rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 24px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 10px;
        }

        .refresh-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 768px) {
            .rank-tabs {
                gap: 10px;
            }
            
            .rank-tab {
                padding: 10px 20px;
                font-size: 14px;
            }
            
            .rank-item {
                padding: 15px;
            }
            
            .book-cover {
                width: 60px;
                height: 80px;
                font-size: 24px;
            }
            
            .book-title {
                font-size: 16px;
            }
            
            .book-stats {
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .rank-number {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="nav">
                <div class="logo">
                    <a href="/">
                        <i class="fas fa-crown"></i>
                        <span>墨韵书阁</span>
                    </a>
                </div>
                <a href="/" class="back-btn">
                    <i class="fas fa-home"></i> 返回首页
                </a>
            </div>
        </div>
    </div>

    <div class="page-content">
        <div class="container">
            <h1 class="page-title">🏆 排行榜</h1>
            <p class="page-subtitle">精选热门小说，领略阅读魅力</p>
            
            <div class="rank-tabs">
                <div class="rank-tab active" data-type="1" onclick="switchRankType(1)">
                    <i class="fas fa-fire"></i> 点击榜
                </div>
                <div class="rank-tab" data-type="2" onclick="switchRankType(2)">
                    <i class="fas fa-heart"></i> 收藏榜
                </div>
                <div class="rank-tab" data-type="3" onclick="switchRankType(3)">
                    <i class="fas fa-star"></i> 评分榜
                </div>
                <div class="rank-tab" data-type="4" onclick="switchRankType(4)">
                    <i class="fas fa-clock"></i> 更新榜
                </div>
                <div class="rank-tab" data-type="5" onclick="switchRankType(5)">
                    <i class="fas fa-thumbs-up"></i> 推荐榜
                </div>
            </div>

            <div id="rankListContainer" class="rank-list-container active">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> 加载中...
                </div>
            </div>
        </div>
    </div>

    <script>
        const rankTypeNames = {
            1: '点击榜',
            2: '收藏榜',
            3: '评分榜',
            4: '更新榜',
            5: '推荐榜'
        };

        let currentRankType = 1;
        let rankData = {};

        window.onload = function() {
            loadRankData(1);
        };

        function switchRankType(type) {
            currentRankType = type;
            
            document.querySelectorAll('.rank-tab').forEach(tab => {
                tab.classList.remove('active');
                if (parseInt(tab.dataset.type) === type) {
                    tab.classList.add('active');
                }
            });
            
            if (rankData[type]) {
                renderRankList(type);
            } else {
                loadRankData(type);
            }
        }

        async function loadRankData(type) {
            const container = document.getElementById('rankListContainer');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>';
            container.classList.add('active');
            
            try {
                const response = await fetch(`/api/admin/rank/list?rankType=${type}&limit=50`);
                const data = await response.json();
                
                if (data.code === 200) {
                    rankData[type] = data.data || [];
                    renderRankList(type);
                } else {
                    showError(data.msg || '加载失败');
                }
            } catch (error) {
                console.error('加载排行榜失败:', error);
                showError('网络错误，请检查网络连接');
            }
        }

        function renderRankList(type) {
            const container = document.getElementById('rankListContainer');
            const books = rankData[type] || [];
            
            if (books.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📊</div>
                        <div class="empty-title">暂无排行榜数据</div>
                        <p style="color: rgba(255,255,255,0.5); margin-bottom: 20px;">该排行榜暂时没有数据</p>
                        <button class="refresh-btn" onclick="loadRankData(${type})">
                            <i class="fas fa-redo"></i> 刷新试试
                        </button>
                    </div>
                `;
                return;
            }

            const html = books.map((book, index) => `
                <div class="rank-item" onclick="viewBook(${book.bookId})">
                    <div class="rank-number">${index + 1}</div>
                    <div class="book-cover">📖</div>
                    <div class="book-info">
                        <div class="book-title">${book.bookName}</div>
                        <div class="book-author">👤 ${book.authorName}</div>
                        <div class="book-stats">
                            <span><i class="fas fa-eye"></i> ${book.visitCount || 0}</span>
                            <span><i class="fas fa-heart"></i> ${book.favoriteCount || 0}</span>
                            <span><i class="fas fa-star"></i> ${book.rating || 0}</span>
                            <span><i class="fas fa-file-alt"></i> ${book.totalWords || 0}字</span>
                        </div>
                        ${book.description ? `<div class="book-desc">${book.description}</div>` : ''}
                    </div>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        function viewBook(bookId) {
            window.location.href = `/book.html?id=${bookId}`;
        }

        function showError(message) {
            const container = document.getElementById('rankListContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">⚠️</div>
                    <div class="empty-title">加载失败</div>
                    <p style="color: rgba(255,255,255,0.5); margin-bottom: 20px;">${message}</p>
                    <button class="refresh-btn" onclick="loadRankData(${currentRankType})">
                        <i class="fas fa-redo"></i> 重试
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
