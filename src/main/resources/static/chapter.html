        }

        }

        .nav-btn:hover {
            background: #e74c3c;
            color: white;
        }

        .nav-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;

        /* 字体大小调整 */
        .font-small .chapter-content {
            font-size: 14px;
        }
        .font-medium .chapter-content {
            font-size: 18px;

            font-size: 22px;

<body id="readingBody" class="font-medium">
    <div class="header">
        <div class="container">
            <div class="nav">
                <a href="/">← 返回首页</a>
                <div class="reading-settings">
                    <div class="settings-btn" onclick="changeFontSize('small')">A-</div>
                    <div class="settings-btn" onclick="changeFontSize('medium')">A</div>
                    <div class="settings-btn" onclick="changeFontSize('large')">A+</div>
                </div>
            </div>
        </div>
    </div>

    <div class="reading-content">
        <div class="container">
            <div id="chapterContent" class="loading">加载中...</div>
        </div>
    </div>

    <footer>
        <p>墨韵书阁 · 享受阅读的乐趣</p>
    </footer>

    <script>
        let bookId = null;
        let chapterId = null;
        let currentChapter = null;
        let token = null;
        let userId = null;
        let totalChapters = 0;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            bookId = urlParams.get('bookId');
            chapterId = urlParams.get('chapterId');
            
            token = localStorage.getItem('token');
            userId = localStorage.getItem('userId');
            
            if (chapterId) {
                loadChapter();
            }
        };

        async function loadChapter() {
            try {
                let url = `/api/book/chapter/${chapterId}`;
                if (userId) {
                    url += `?userId=${userId}`;
                }
                const response = await fetch(url);
                const data = await response.json();
                if (data.code === 200) {
                    renderChapter(data.data);
                    currentChapter = data.data;
                    
                    if (userId) {
                        loadTotalChapters();
                        updateReadProgress();
                    }
                } else {
                    document.getElementById('chapterContent').innerHTML = '<div class="loading">加载失败：' + data.msg + '</div>';
                }
            } catch (error) {
                console.error('加载章节失败:', error);
                document.getElementById('chapterContent').innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
            }
        }

        async function loadTotalChapters() {
            try {
                const response = await fetch(`/api/book/${bookId}/chapters`);
                const data = await response.json();
                if (data.code === 200 && data.data) {
                    totalChapters = data.data.length;
                }
            } catch (error) {
                console.error('加载章节总数失败:', error);
            }
        }

        async function updateReadProgress() {
            if (!userId || !currentChapter || totalChapters === 0) return;
            
            const progress = Math.round((currentChapter.chapterNum / totalChapters) * 100);
            
            try {
                await fetch('/api/book/bookshelf/progress', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        userId: parseInt(userId),
                        bookId: parseInt(bookId),
                        chapterId: parseInt(chapterId),
                        chapterNum: currentChapter.chapterNum,
                        chapterName: currentChapter.chapterName,
                        readProgress: progress
                    })
                });
            } catch (error) {
                console.error('更新阅读进度失败:', error);
            }
        }

        function renderChapter(chapter) {
            const html = `
                <h1 class="chapter-title">第${chapter.chapterNum}章 ${chapter.chapterName}</h1>
                <div class="chapter-content">
                    ${chapter.content.replace(/\n/g, '<br>')}
                </div>
                <div class="navigation">
                    ${chapter.prevChapterId ? 
                        `<a href="/chapter.html?bookId=${bookId}&chapterId=${chapter.prevChapterId}" class="nav-btn">← 上一章</a>` : 
                        `<span class="nav-btn disabled">← 上一章</span>`}
                    <a href="/book.html?id=${bookId}" class="nav-btn">返回目录</a>
                    ${chapter.nextChapterId ? 
                        `<a href="/chapter.html?bookId=${bookId}&chapterId=${chapter.nextChapterId}" class="nav-btn">下一章 →</a>` : 
                        `<span class="nav-btn disabled">下一章 →</span>`}
                </div>
            `;
            document.getElementById('chapterContent').innerHTML = html;
            document.title = `${chapter.chapterName} - 墨韵书阁`;
            
            // 滚动到顶部
            window.scrollTo(0, 0);
        }

        function changeFontSize(size) {
            const body = document.getElementById('readingBody');
            body.classList.remove('font-small', 'font-medium', 'font-large');
            body.classList.add(`font-${size}`);
        }
    </script>
</body>
